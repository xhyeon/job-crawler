name: Daily Job Crawl

on:
  schedule:
    # GitHub Actions cron은 UTC 기준입니다.
    # 07:00 UTC = 한국시간(KST) 매일 오후 4:00
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: daily-job-crawl
  cancel-in-progress: false

jobs:
  crawl:
    name: Crawl and build site
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TZ: Asia/Seoul
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Show browser versions
        run: |
          python --version
          google-chrome --version
          chromedriver --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile job_crawler.py

      - name: Run crawler
        run: |
          python job_crawler.py \
            --platform all \
            --category all \
            --headless \
            --auto-only \
            --max-pages 10 \
            --known-page-stop 1 \
            --scroll 6 \
            --wanted-detail-delay 0.8

      - name: Commit crawl results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json site/index.html site/jobs.csv site/jobs.json

          if git diff --cached --quiet; then
            echo "변경된 크롤링 결과가 없습니다."
          else
            git commit -m "chore: update jobs $(date '+%Y-%m-%d %H:%M KST')"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site
          include-hidden-files: true

      - name: Upload debug files on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: crawler-debug-${{ github.run_id }}
          path: |
            debug/
            data/wanted_partial_jobs.json
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    name: Deploy GitHub Pages
    needs: crawl
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
